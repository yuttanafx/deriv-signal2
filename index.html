<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>V35.4 Trading Bot</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.top{
display:flex;
gap:10px;
padding:10px;
background:#111827;
}

.panel{
display:flex;
height:50vh;
}

.box{
flex:1;
border:1px solid #333;
padding:10px;
overflow:auto;
}

button{
padding:8px;
cursor:pointer;
}

input, select{
width:100%;
margin:5px 0;
padding:5px;
}
.green{color:#00ff99}
.red{color:#ff4d4d}
</style>
</head>

<body>

<div class="top">
MODE:
<button onclick="setMode('DEMO')">DEMO</button>
<button onclick="setMode('LIVE')">LIVE</button>

<button onclick="runSignal()">AUTO SCAN</button>
</div>

<div>
💰 Balance: <span id="bal">10000</span>
 | Mode: <span id="mode">DEMO</span>
 | Step: <span id="step">0</span>
</div>

<div class="panel">

<!-- SIGNAL LOG -->
<div class="box">
<h3>SIGNAL LOG</h3>
<div id="log"></div>
</div>

<!-- ORDER PANEL -->
<div class="box">
<h3>ORDER PANEL</h3>

Asset:
<select id="asset">
<option>R_25</option>
<option>R_50</option>
<option>R_100</option>
</select>

Lot:
<input id="lot" value="1"/>

Expiry (min):
<input id="expiry" value="1"/>

MARTINGALE:
<br/>
Enable <input type="checkbox" id="mg"/><br/>
Multiplier <input id="multi" value="2"/><br/>
Max Steps <input id="maxstep" value="5"/><br/>

<button onclick="manualTrade('CALL')">CALL</button>
<button onclick="manualTrade('PUT')">PUT</button>

<button onclick="connect()">CONNECT (LIVE)</button>

</div>

</div>

<script>

let balance = 10000;
let mode = "DEMO";
let step = 0;

function setMode(m){
mode = m;
document.getElementById("mode").innerText = m;
}

function log(msg,color="white"){
let div = document.createElement("div");
div.innerHTML = msg;
div.style.color = color;
document.getElementById("log").prepend(div);
}

function martingale(lot){
if(!document.getElementById("mg").checked) return lot;

let mult = parseFloat(document.getElementById("multi").value);
let max = parseInt(document.getElementById("maxstep").value);

if(step >= max){
step = 0;
return lot;
}

return lot * Math.pow(mult, step);
}

function manualTrade(dir){
let lot = parseFloat(document.getElementById("lot").value);
lot = martingale(lot);

executeTrade(dir, lot, "MANUAL");
}

function runSignal(){

// fake signal engine
let dir = Math.random()>0.5?"CALL":"PUT";
let lot = parseFloat(document.getElementById("lot").value);

lot = martingale(lot);

executeTrade(dir, lot, "AUTO");
}

function executeTrade(dir, lot, type){

let expiry = document.getElementById("expiry").value;

if(mode==="DEMO"){

let win = Math.random()>0.4; // ~60%

if(win){
balance += lot*0.8;
step = 0;
log(`🟢 ${type} ${dir} WIN +${lot*0.8}`, "lime");
}else{
balance -= lot;
step++;
log(`🔴 ${type} ${dir} LOSS -${lot}`, "red");
}

document.getElementById("bal").innerText = balance;

}else{

// LIVE (stub)
log(`⚡ LIVE ORDER SENT ${dir} ${lot} ${expiry}m`, "orange");
}

}

function connect(){
mode="LIVE";
document.getElementById("mode").innerText="LIVE";
log("🔌 CONNECTED TO DERIV (SIM)", "cyan");
}

</script>

</body>
</html>
