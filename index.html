<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVT Tech System — FIXED V9 ENGINE</title>
</head>

<body>

<script>

// ==========================
// 🧠 STATE FIXED
// ==========================

let state = {};
let watchedSymbols = ['R_75'];

function ensureState(sym){
  if(!state[sym]){
    state[sym] = {
      ticks: [],
      lastPrice: null,
      prevPrice: null,
      tickCounter: 0,
      sigType: 'NEUTRAL',
      sigText: '',
      sigSub: '',
      support: 0,
      resistance: 0,
      pendingContracts: []
    };
  }
}

// ==========================
// 📊 SAFE EMA
// ==========================

function EMA(arr, period){
  if(!arr || arr.length < period) return arr[arr.length-1] || 0;

  const k = 2/(period+1);
  let ema = arr[0];

  for(let i=1;i<arr.length;i++){
    ema = arr[i]*k + ema*(1-k);
  }

  return ema;
}

// ==========================
// 📊 SUPPORT / RESISTANCE SAFE
// ==========================

function calcSR(ticks){
  const t = ticks.slice(-30);
  if(t.length < 2) return {support:0,resistance:0};

  return {
    support: Math.min(...t),
    resistance: Math.max(...t)
  };
}

// ==========================
// 🧠 V9 FILTER (SAFE LAYER)
// ==========================

function v9Filter(s){

  const t = s.ticks;
  if(t.length < 10) return true;

  const range = Math.max(...t.slice(-20)) - Math.min(...t.slice(-20));

  // ❌ noise market
  if(range > 0.02){
    s.sigType = "BLOCK";
    s.sigText = "V9 FILTER";
    s.sigSub = "NOISE MARKET DETECTED";
    return false;
  }

  return true;
}

// ==========================
// 🧠 MAIN SIGNAL ENGINE (FIXED)
// ==========================

function onTickReceived(tick){

  const sym = tick.symbol;
  if(!sym) return;

  ensureState(sym);

  const s = state[sym];
  const price = parseFloat(tick.quote);

  if(isNaN(price)) return;

  s.tickCounter++;
  s.prevPrice = s.lastPrice;
  s.lastPrice = price;

  s.ticks.push(price);
  if(s.ticks.length > 200) s.ticks.shift();

  // ==========================
  // 🧠 V9 FILTER (BEFORE LOGIC)
  // ==========================

  if(!v9Filter(s)) return;

  // ==========================
  // 📊 STRUCTURE
  // ==========================

  const sr = calcSR(s.ticks);
  s.support = sr.support;
  s.resistance = sr.resistance;

  const midMin = sr.support + (sr.resistance - sr.support)*0.35;
  const midMax = sr.support + (sr.resistance - sr.support)*0.65;

  // ==========================
  // 🧠 MOMENTUM
  // ==========================

  const momentum =
    s.ticks.length > 5
    ? price - s.ticks[s.ticks.length-5]
    : 0;

  let signal = "NEUTRAL";

  // ==========================
  // 🚀 LOGIC (เดิม + FIXED)
  // ==========================

  if(price > midMin && price < midMax){
    s.sigType = "BLOCK";
    s.sigText = "COMPRESSION";
    s.sigSub = "MID ZONE";
  }
  else if(price >= sr.resistance && momentum > 0){
    s.sigType = "BUY";
    s.sigText = "BREAKOUT UP";
    s.sigSub = "CALL SIGNAL";
    signal = "BUY";
  }
  else if(price <= sr.support && momentum < 0){
    s.sigType = "SELL";
    s.sigText = "BREAKOUT DOWN";
    s.sigSub = "PUT SIGNAL";
    signal = "SELL";
  }
  else {
    s.sigType = "NEUTRAL";
    s.sigText = "WAIT";
    s.sigSub = "NO EDGE";
  }

  // ==========================
  // 💥 EXEC (TEST MODE)
  // ==========================

  if(signal !== "NEUTRAL"){
    console.log("EXEC:", sym, signal, price);
  }
}

// ==========================
// 🧪 TEST FEED (FIX NO DATA ISSUE)
// ==========================

setInterval(()=>{

  onTickReceived({
    symbol: "R_75",
    quote: (100 + Math.random()*0.5).toFixed(5)
  });

}, 1000);

</script>

</body>
</html>
