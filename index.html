<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V13 AI Trading Dashboard</title>

<style>

/* =========================
   BASE THEME
========================= */

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.status{
  display:flex;
  gap:20px;
  font-size:12px;
  opacity:0.8;
}

/* GRID MAIN */
.grid-top{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:16px;
}

/* SYMBOL CARD */
.card{
  background:#111827;
  border-radius:14px;
  padding:14px;
  border:1px solid rgba(255,255,255,0.05);
  position:relative;
}

.symbol{
  font-size:12px;
  opacity:0.7;
}

.signal{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.price{
  font-size:11px;
  opacity:0.8;
}

/* COLORS */
.call{color:#22c55e;}
.put{color:#ef4444;}
.neutral{color:#fbbf24;}

/* MAIN LAYOUT */
.main{
  display:grid;
  grid-template-columns:2.2fr 1fr;
  gap:12px;
  padding:0 16px;
}

/* CHART AREA */
.chart{
  background:#111827;
  border-radius:14px;
  height:420px;
  padding:12px;
}

/* SIDE PANEL */
.side{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.panel{
  background:#111827;
  border-radius:14px;
  padding:12px;
}

/* BOTTOM */
.bottom{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:16px;
}

.small{
  font-size:12px;
  opacity:0.8;
}

</style>
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">
  <div>🚀 V13 REAL SCORING ENGINE</div>

  <div class="status">
    <div>● LIVE</div>
    <div>AI SCORING ACTIVE</div>
    <div>8 SYMBOLS</div>
  </div>
</div>

<!-- ================= SYMBOL GRID ================= -->
<div class="grid-top" id="grid"></div>

<!-- ================= MAIN ================= -->
<div class="main">

  <div class="chart">
    📈 TRADINGVIEW CHART AREA (HOOK HERE)
  </div>

  <div class="side">

    <div class="panel">
      🧠 SIGNAL SUMMARY<br>
      <div class="small" id="summary"></div>
    </div>

    <div class="panel">
      📊 MARKET FILTER<br>
      <div class="small">VOLATILITY: NORMAL</div>
      <div class="small">TREND: ACTIVE</div>
    </div>

  </div>

</div>

<!-- ================= BOTTOM ================= -->
<div class="bottom">

  <div class="panel">TOP OPPORTUNITIES</div>
  <div class="panel">AI NOTES</div>
  <div class="panel">SYSTEM INFO</div>

</div>

<script>

// =========================
// SYMBOLS
// =========================

const symbols = [
"R_10","R_25","R_50","R_75",
"R_100","R_150","R_200","R_300"
];

let state = {};

// =========================
// SIMPLE SCORING ENGINE
// =========================

function decide(price, prev){

  const diff = price - prev;

  if(diff > 0.02) return "CALL";
  if(diff < -0.02) return "PUT";
  return "NEUTRAL";
}

// =========================
// RENDER UI
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let call=0, put=0, neutral=0;

  symbols.forEach(sym=>{

    if(!state[sym]){
      state[sym] = {
        price:100+Math.random(),
        prev:100+Math.random()
      };
    }

    const s = state[sym];

    s.prev = s.price;
    s.price = 100 + Math.random()*0.5;

    const sig = decide(s.price, s.prev);

    if(sig==="CALL") call++;
    if(sig==="PUT") put++;
    if(sig==="NEUTRAL") neutral++;

    let cls = "neutral";
    if(sig==="CALL") cls="call";
    if(sig==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div class="symbol">${sym}</div>
        <div class="signal ${cls}">${sig}</div>
        <div class="price">PRICE: ${s.price.toFixed(3)}</div>
      </div>
    `;
  });

  document.getElementById("summary").innerHTML =
    `CALL: ${call} | PUT: ${put} | NEUTRAL: ${neutral}`;
}

// =========================
// LOOP
// =========================

setInterval(render, 900);

</script>

</body>
</html>
