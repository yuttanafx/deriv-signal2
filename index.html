<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V14 TradingView AI Dashboard</title>

<style>

body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.symbol{
  font-size:12px;
  opacity:0.7;
}

.signal{
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

.call{color:#22c55e;}
.put{color:#ef4444;}
.neutral{color:#fbbf24;}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  padding:12px;
}

/* CHART */
.chart{
  height:500px;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
}

/* SIDE */
.side{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.panel{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="top">
  <div>🚀 V14 AI + TRADINGVIEW CONNECT</div>
  <div id="activeSym">R_100</div>
</div>

<!-- SYMBOL GRID -->
<div class="grid" id="grid"></div>

<!-- MAIN -->
<div class="main">

  <div class="chart" id="chartBox">
    <!-- TradingView loads here -->
  </div>

  <div class="side">
    <div class="panel">
      🧠 AI STATUS<br>
      ACTIVE SCORING ENGINE
    </div>

    <div class="panel">
      📊 SIGNAL SUMMARY<br>
      CLICK SYMBOL TO SWITCH CHART
    </div>
  </div>

</div>

<script>

// =========================
// SYMBOLS
// =========================

const symbols = [
 "R_10","R_25","R_50","R_75",
 "R_100","R_150","R_200","R_300"
];

let state = {};

// =========================
// SIGNAL ENGINE (SIMPLE)
// =========================

function signal(price, prev){

  const diff = price - prev;

  if(diff > 0.02) return "CALL";
  if(diff < -0.02) return "PUT";
  return "NEUTRAL";
}

// =========================
// TRADINGVIEW LOAD
// =========================

function loadChart(sym){

  document.getElementById("activeSym").innerText = sym;

  const box = document.getElementById("chartBox");

  box.innerHTML = `
  <iframe
    src="https://www.tradingview.com/widgetembed/?symbol=${sym}&interval=1&theme=dark"
    width="100%"
    height="500"
    frameborder="0">
  </iframe>
  `;
}

// =========================
// RENDER GRID
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    if(!state[sym]){
      state[sym] = {
        price:100+Math.random(),
        prev:100+Math.random()
      };
    }

    const s = state[sym];

    s.prev = s.price;
    s.price = 100 + Math.random()*0.5;

    const sig = signal(s.price, s.prev);

    let cls = "neutral";
    if(sig==="CALL") cls="call";
    if(sig==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card" onclick="loadChart('${sym}')">
        <div class="symbol">${sym}</div>
        <div class="signal ${cls}">${sig}</div>
      </div>
    `;
  });
}

// =========================
// INIT
// =========================

loadChart("R_100");
setInterval(render, 1000);

</script>

</body>
</html>
