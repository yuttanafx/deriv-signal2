<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V12 AI Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.header{
  padding:18px 22px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{
  font-size:12px;
  opacity:0.7;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:20px;
}

/* CARD */
.card{
  background:#111827;
  border-radius:16px;
  padding:16px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.05);
}

.symbol{
  font-size:13px;
  opacity:0.7;
}

.signal{
  font-size:26px;
  font-weight:bold;
  margin:12px 0;
}

.price{
  font-size:12px;
  opacity:0.8;
}

/* COLORS */
.call{ color:#22c55e; }
.put{ color:#ef4444; }
.neutral{ color:#fbbf24; }

.badge{
  font-size:11px;
  opacity:0.6;
  margin-top:6px;
}

/* TOP BAR */
.topbar{
  display:flex;
  gap:10px;
  align-items:center;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="header">
  <div>🚀 V12 AI MULTI-SYMBOL DASHBOARD</div>

  <div class="topbar">
    <div class="dot"></div>
    <div class="status">LIVE MARKET ANALYSIS</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>

// =========================
// SYMBOLS (8 ตัว)
// =========================

const symbols = [
  "R_10","R_25","R_50","R_75",
  "R_100","R_150","R_200","R_300"
];

// =========================
// STATE
// =========================

let state = {};

// =========================
// SIMPLE AI (CLEAN SIGNAL)
// =========================

function decide(price, prev){
  const diff = price - prev;

  if(diff > 0.02) return "CALL";
  if(diff < -0.02) return "PUT";
  return "NEUTRAL";
}

// =========================
// RENDER DASHBOARD
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    if(!state[sym]){
      state[sym] = {
        price: 100 + Math.random()*0.5,
        prev: 100 + Math.random()*0.5,
        signal: "NEUTRAL",
        confidence: Math.floor(Math.random()*40+50)
      };
    }

    const s = state[sym];

    s.prev = s.price;
    s.price = 100 + Math.random()*0.5;

    s.signal = decide(s.price, s.prev);

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div class="symbol">${sym}</div>

        <div class="signal ${cls}">
          ${s.signal}
        </div>

        <div class="price">
          PRICE: ${s.price.toFixed(3)}
        </div>

        <div class="badge">
          CONFIDENCE: ${s.confidence}%
        </div>
      </div>
    `;
  });
}

// =========================
// LOOP (REAL TIME FEEL)
// =========================

setInterval(render, 900);

</script>

</body>
</html>
