<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>V8 + V9 Hybrid Trading Engine</title>
</head>

<body>

<script>

// ===============================
// 🧠 STATE
// ===============================

let state = {};

// ===============================
// 🧯 TRADE GUARD
// ===============================

class TradeGuard {
  constructor() {
    this.lastTradeTime = 0;
    this.cooldown = 4000;
  }

  allow() {
    const now = Date.now();
    if (now - this.lastTradeTime < this.cooldown) return false;
    this.lastTradeTime = now;
    return true;
  }
}

const tradeGuard = new TradeGuard();

// ===============================
// 📊 V8 INDICATORS (ORIGINAL SAFE)
// ===============================

function EMA(arr, period) {
  const k = 2 / (period + 1);
  let ema = arr[0];
  for (let i = 1; i < arr.length; i++) {
    ema = arr[i] * k + ema * (1 - k);
  }
  return ema;
}

function calcSR(ticks) {
  const recent = ticks.slice(-30);
  return {
    support: Math.min(...recent),
    resistance: Math.max(...recent),
    mid: (Math.min(...recent) + Math.max(...recent)) / 2
  };
}

// ===============================
// 🧠 V9 INTELLIGENCE LAYER (ADD-ON ONLY)
// ===============================

// Liquidity memory (ZONE MEMORY)
function updateLiquidityMemory(s, price) {
  if (!s.zones) s.zones = [];

  let z = s.zones.find(x => Math.abs(x.level - price) < 0.0005);

  if (z) {
    z.touches++;
  } else {
    s.zones.push({ level: price, touches: 1 });
  }

  s.zones.sort((a,b)=>b.touches - a.touches);
  s.zones = s.zones.slice(0, 5);
}

// Fake breakout filter
function isFakeBreakout(ticks, price, r, spt) {
  const prev = ticks[ticks.length - 2];

  const up = price > r && price < prev;
  const down = price < spt && price > prev;

  return up || down;
}

// Adaptive volatility multiplier
function adaptive(ticks) {
  const recent = ticks.slice(-30);
  const range = Math.max(...recent) - Math.min(...recent);

  if (range > 0.01) return 1.4;
  if (range < 0.003) return 0.7;
  return 1;
}

// Market quality filter
function marketQuality(ticks) {
  const r = Math.max(...ticks.slice(-20)) - Math.min(...ticks.slice(-20));
  const avg = ticks.slice(-20).reduce((a,b)=>a+b,0)/20;

  const ratio = r / (avg || 1);

  if (ratio > 0.015) return "NOISE";
  if (ratio < 0.002) return "FLAT";
  return "NORMAL";
}

// ===============================
// 🧠 V8 CORE BRAIN (UNCHANGED)
// ===============================

class V8 {

  decide(f) {

    let score = 0;

    if (f.ema20 > f.ema50) score++;
    else score--;

    if (f.momentum > 0) score++;
    else score--;

    if (score >= 2) return { signal: "BUY", confidence: 0.7, agent: "V8" };
    if (score <= -2) return { signal: "SELL", confidence: 0.7, agent: "V8" };

    return { signal: "NEUTRAL", confidence: 0.5, agent: "V8" };
  }
}

const v8 = new V8();

// ===============================
// 💰 EXECUTION
// ===============================

function execute(sym, dir) {
  console.log("EXEC:", sym, dir);
}

// ===============================
// 📥 MAIN ENGINE
// ===============================

function onTickReceived(tick) {

  const sym = tick.symbol;

  if (!state[sym]) {
    state[sym] = { ticks: [], tickCounter: 0 };
  }

  const s = state[sym];

  const price = parseFloat(tick.quote);

  s.tickCounter++;
  s.ticks.push(price);

  if (s.ticks.length > 200) s.ticks.shift();

  // 🧯 GUARD
  if (!tradeGuard.allow()) return;

  if (s.ticks.length < 50) return;

  // ===============================
  // 🧠 V9 INTELLIGENCE FILTER (SAFE LAYER ONLY)
  // ===============================

  updateLiquidityMemory(s, price);

  const quality = marketQuality(s.ticks);
  const fake = isFakeBreakout(s.ticks, price, 0, 0); // optional safe mode

  if (quality === "NOISE") {
    s.sig = "BLOCK";
    return;
  }

  if (fake) {
    s.sig = "BLOCK";
    return;
  }

  const sr = calcSR(s.ticks);

  const features = {
    ema20: EMA(s.ticks.slice(-20), 20),
    ema50: EMA(s.ticks.slice(-50), 50),
    momentum: s.ticks[s.ticks.length - 1] - s.ticks[s.ticks.length - 5],
    support: sr.support,
    resistance: sr.resistance,
    mid: sr.mid
  };

  // ===============================
  // 🧠 V8 DECISION (UNCHANGED CORE)
  // ===============================

  const decision = v8.decide(features);

  if (decision.signal === "BUY") {
    execute(sym, "HIGHER");
  }

  if (decision.signal === "SELL") {
    execute(sym, "LOWER");
  }
}

</script>

</body>
</html>
