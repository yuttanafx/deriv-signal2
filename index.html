<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V19 STABLE REAL SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.signal{
  font-size:18px;
  font-weight:bold;
}

.call{color:#22c55e}
.put{color:#ef4444}
.neutral{color:#fbbf24}

/* CHART */
.chart{
  height:500px;
  background:#111827;
  margin:10px;
  border-radius:12px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="top">
  <div>🚀 V19 STABLE SYSTEM</div>
  <div id="status">DISCONNECTED</div>
</div>

<div class="grid" id="grid"></div>

<div class="chart" id="chartBox">
  📊 CHART READY
</div>

<script>

////////////////////////////////////////////////////
// 🧱 1. STATE (SAFE)
////////////////////////////////////////////////////

let state = {};

const symbols = [
"R_10","R_25","R_50","R_75",
"R_100","R_150","R_200","R_300"
];

////////////////////////////////////////////////////
// 🧠 2. ENGINE (NO BROKER MIX)
////////////////////////////////////////////////////

function processTick(symbol, price){

  if(!state[symbol]){
    state[symbol] = {
      price,
      prev: price,
      signal:"NEUTRAL",
      score:0
    };
  }

  const s = state[symbol];

  s.prev = s.price;
  s.price = price;

  const diff = s.price - s.prev;

  let score = 0;

  if(diff > 0.02) score += 2;
  if(diff < -0.02) score -= 2;

  let signal = "NEUTRAL";

  if(score >= 2) signal = "CALL";
  if(score <= -2) signal = "PUT";

  s.score = score;
  s.signal = signal;
}

////////////////////////////////////////////////////
// 🔌 3. DERIV CONNECT (SAFE ONLY DATA LAYER)
////////////////////////////////////////////////////

let ws = null;

function connectBroker(){

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    document.getElementById("status").innerText = "CONNECTED";

    symbols.forEach(sym=>{
      ws.send(JSON.stringify({
        ticks: sym,
        subscribe: 1
      }));
    });
  };

  ws.onmessage = (msg) => {

    const data = JSON.parse(msg.data);

    if(data.tick){

      const symbol = data.tick.symbol;
      const price = parseFloat(data.tick.quote);

      if(symbol && price){
        processTick(symbol, price);
        render();
      }
    }
  };

  ws.onclose = () => {
    document.getElementById("status").innerText = "DISCONNECTED";
  };
}

////////////////////////////////////////////////////
// 🖥️ 4. UI (SAFE RENDER ONLY)
////////////////////////////////////////////////////

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    const s = state[sym] || {signal:"NEUTRAL",score:0};

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div>${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
        <div style="font-size:12px;opacity:0.7">
          SCORE: ${s.score}
        </div>
      </div>
    `;
  });
}

////////////////////////////////////////////////////
// 🚀 START (SAFE)
////////////////////////////////////////////////////

render();
connectBroker();

</script>

</body>
</html>
