<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V17 AUTO TRADING ENGINE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.signal{
  font-size:18px;
  font-weight:bold;
}

.call{color:#22c55e}
.put{color:#ef4444}
.neutral{color:#fbbf24}

.panel{
  padding:10px;
  background:#111827;
  margin:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="top">
  <div>🚀 V17 AUTO TRADING SYSTEM</div>
  <div id="status">IDLE</div>
</div>

<div class="panel">
  AUTO MODE:
  <button onclick="toggleAuto()">TOGGLE</button>
  <span id="autoState">OFF</span>
</div>

<div class="grid" id="grid"></div>

<div class="panel" id="log"></div>

<script>

// =========================
// CONFIG (RISK CONTROL)
// =========================

let AUTO = false;
let lastTradeTime = 0;
const COOLDOWN = 5000; // 5 sec
const MIN_CONFIDENCE = 0.65;

// =========================
// SYMBOLS
// =========================

const symbols = ["R_10","R_25","R_50","R_75","R_100","R_150","R_200","R_300"];

let state = {};

// =========================
// LOG
// =========================

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

// =========================
// AI DECISION
// =========================

function decide(price, prev){

  const diff = price - prev;

  if(diff > 0.02) return {signal:"CALL", confidence:0.7};
  if(diff < -0.02) return {signal:"PUT", confidence:0.7};

  return {signal:"SKIP", confidence:0.4};
}

// =========================
// RISK ENGINE
// =========================

function canTrade(conf){

  const now = Date.now();

  if(!AUTO) return false;
  if(conf < MIN_CONFIDENCE) return false;
  if(now - lastTradeTime < COOLDOWN) return false;

  lastTradeTime = now;
  return true;
}

// =========================
// EXECUTION ENGINE (DERIV READY HOOK)
// =========================

function executeTrade(sym, signal){

  log("💰 EXEC: " + sym + " => " + signal);

  // 🔥 REAL API HOOK PLACEHOLDER
  // fetch("https://api.deriv.com/...") <- production use

}

// =========================
// ENGINE
// =========================

function tick(sym){

  if(!state[sym]){
    state[sym] = {
      price:100+Math.random(),
      prev:100+Math.random(),
      signal:"SKIP"
    };
  }

  const s = state[sym];

  s.prev = s.price;
  s.price = 100 + Math.random()*0.5;

  const d = decide(s.price, s.prev);

  s.signal = d.signal;

  // AUTO TRADE
  if(d.signal !== "SKIP"){

    if(canTrade(d.confidence)){
      executeTrade(sym, d.signal);
    }
  }
}

// =========================
// UI
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    tick(sym);

    const s = state[sym];

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div>${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
      </div>
    `;
  });
}

// =========================
// AUTO LOOP
// =========================

setInterval(render, 1000);

// =========================
// TOGGLE
// =========================

function toggleAuto(){
  AUTO = !AUTO;
  document.getElementById("autoState").innerText = AUTO ? "ON" : "OFF";
  log("AUTO MODE: " + AUTO);
}

</script>

</body>
</html>
