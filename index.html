<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V14 AUTO TradingView AI</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:14px;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:#22c55e;display:inline-block;margin-right:6px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:12px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
}

.symbol{font-size:12px;opacity:0.7;}
.signal{font-size:20px;font-weight:bold;margin:8px 0;}

.call{color:#22c55e;}
.put{color:#ef4444;}
.neutral{color:#fbbf24;}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  padding:12px;
}

/* CHART */
.chart{
  height:520px;
  border-radius:14px;
  overflow:hidden;
  background:#111827;
}

/* SIDE */
.panel{
  background:#111827;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>🚀 V14 AUTO TRADINGVIEW ENGINE</div>
  <div><span class="dot"></span>ACTIVE</div>
</div>

<div class="grid" id="grid"></div>

<div class="main">

  <!-- CHART -->
  <div class="chart" id="chartBox"></div>

  <!-- SIDE -->
  <div>

    <div class="panel">
      🧠 ACTIVE SYMBOL<br>
      <div id="activeSym">-</div>
    </div>

    <div class="panel">
      📊 AUTO SCAN MODE<br>
      PICKS STRONGEST SIGNAL
    </div>

  </div>

</div>

<script>

// =========================
// SYMBOLS
// =========================

const symbols = [
"R_10","R_25","R_50","R_75",
"R_100","R_150","R_200","R_300"
];

// =========================
// STATE
// =========================

let state = {};

// =========================
// SIMPLE SCORING ENGINE
// =========================

function score(price, prev){
  const diff = price - prev;

  let signal = "NEUTRAL";
  let power = 0;

  if(diff > 0.02){
    signal = "CALL";
    power = diff * 100;
  }

  if(diff < -0.02){
    signal = "PUT";
    power = Math.abs(diff) * 100;
  }

  return {signal, power};
}

// =========================
// TRADINGVIEW LOAD
// =========================

function loadChart(sym){

  document.getElementById("activeSym").innerText = sym;

  document.getElementById("chartBox").innerHTML = `
    <iframe
      src="https://www.tradingview.com/widgetembed/?symbol=${sym}&interval=1&theme=dark"
      width="100%"
      height="520"
      frameborder="0">
    </iframe>
  `;
}

// =========================
// FIND STRONGEST SYMBOL
// =========================

function getBestSymbol(){

  let best = null;

  symbols.forEach(sym=>{

    if(!state[sym]){
      state[sym] = {
        price:100+Math.random(),
        prev:100+Math.random(),
        power:0,
        signal:"NEUTRAL"
      };
    }

    const s = state[sym];

    s.prev = s.price;
    s.price = 100 + Math.random()*0.5;

    const r = score(s.price, s.prev);

    s.signal = r.signal;
    s.power = r.power;

    if(!best || r.power > best.power){
      best = {sym, power:r.power};
    }
  });

  return best ? best.sym : "R_100";
}

// =========================
// RENDER GRID
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    const s = state[sym];

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div class="symbol">${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
        <div style="font-size:12px;opacity:0.7">
          POWER: ${s.power.toFixed(3)}
        </div>
      </div>
    `;
  });
}

// =========================
// AUTO ENGINE LOOP
// =========================

function loop(){

  const best = getBestSymbol();

  render();

  // 🔥 AUTO SWITCH CHART (NO CLICK NEEDED)
  loadChart(best);
}

// =========================
// START
// =========================

setInterval(loop, 1200);

</script>

</body>
</html>
