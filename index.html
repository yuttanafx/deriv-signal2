<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V16 DERIV REAL CONNECT</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial;
}

.top{
  padding:14px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.signal{
  font-size:18px;
  font-weight:bold;
}

.call{color:#22c55e}
.put{color:#ef4444}
.neutral{color:#fbbf24}

.chart{
  height:400px;
  background:#111827;
  margin:10px;
  border-radius:12px;
  padding:10px;
}

.log{
  height:120px;
  overflow:auto;
  font-size:11px;
  background:#0f172a;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="top">
  <div>🚀 V16 DERIV REAL CONNECT</div>
  <div id="status">DISCONNECTED</div>
</div>

<div class="grid" id="grid"></div>

<div class="chart">
  📊 LIVE PRICE: <span id="price">-</span><br>
  SIGNAL: <span id="signal">-</span>
</div>

<div class="log" id="log"></div>

<script>

// =========================
// SYMBOLS
// =========================

const symbols = ["R_10","R_25","R_50","R_75","R_100","R_150","R_200","R_300"];

let state = {};

// =========================
// LOG
// =========================

function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

// =========================
// DERIV SOCKET
// =========================

let ws;

function connect(){

  ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

  ws.onopen = () => {
    document.getElementById("status").innerText = "CONNECTED";
    log("CONNECTED TO DERIV");

    // subscribe all symbols
    symbols.forEach(sym=>{
      ws.send(JSON.stringify({
        ticks: sym,
        subscribe: 1
      }));
    });
  };

  ws.onmessage = (msg) => {

    const data = JSON.parse(msg.data);

    if(data.tick){

      const sym = data.tick.symbol;
      const price = parseFloat(data.tick.quote);

      handleTick(sym, price);
    }
  };

  ws.onclose = () => {
    document.getElementById("status").innerText = "DISCONNECTED";
    log("DISCONNECTED");
  };
}

// =========================
// AI ENGINE (LIGHT V16)
// =========================

function decide(s){

  const diff = s.price - s.prev;

  if(diff > 0.02) return "CALL";
  if(diff < -0.02) return "PUT";
  return "NEUTRAL";
}

// =========================
// HANDLE REAL TICK
// =========================

function handleTick(sym, price){

  if(!state[sym]){
    state[sym] = {price, prev:price, signal:"-"}; 
  }

  const s = state[sym];

  s.prev = s.price;
  s.price = price;

  const signal = decide(s);

  s.signal = signal;

  document.getElementById("price").innerText = sym + " : " + price;
  document.getElementById("signal").innerText = signal;

  log(sym + " " + price + " => " + signal);

  render();
}

// =========================
// UI
// =========================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    const s = state[sym] || {signal:"-"};

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div>${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
      </div>
    `;
  });
}

// =========================
// START
// =========================

connect();

</script>

</body>
</html>
