<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V10 AI Trading Engine</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

#log {
  height: 300px;
  overflow: auto;
  background: #111827;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
}

.card {
  margin-top: 10px;
  padding: 10px;
  background: #1f2937;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>🚀 V10 AI Trading Engine (LIVE)</h2>

<div class="card">
  <div id="status">STATUS: RUNNING</div>
  <div id="signal">SIGNAL: -</div>
</div>

<h3>📊 LOG</h3>
<div id="log"></div>

<script>

// =============================
// 🧠 STATE
// =============================

let state = {};

// =============================
// 🧾 UI LOG
// =============================

function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

// =============================
// 🧯 TRADE GUARD
// =============================

class Guard {
  constructor(){
    this.last = 0;
    this.cooldown = 2000;
  }

  allow(){
    const now = Date.now();
    if(now - this.last < this.cooldown) return false;
    this.last = now;
    return true;
  }
}

const guard = new Guard();

// =============================
// 📊 FEATURES
// =============================

function EMA(arr, p){
  const k = 2/(p+1);
  let e = arr[0];
  for(let i=1;i<arr.length;i++){
    e = arr[i]*k + e*(1-k);
  }
  return e;
}

function SR(t){
  const r = t.slice(-20);
  return {
    support: Math.min(...r),
    resistance: Math.max(...r)
  };
}

// =============================
// 🧠 V10 BRAIN
// =============================

class V10Brain {

  decide(f){

    let score = 0;

    // trend
    if(f.ema20 > f.ema50) score++;
    else score--;

    // momentum
    if(f.momentum > 0) score++;
    else score--;

    // breakout quality
    const range = f.resistance - f.support;

    if(range < 0.01) score++; // tight market = breakout ready
    if(range > 0.05) score--; // too volatile

    if(score >= 2) return {signal:"BUY",conf:0.8};
    if(score <= -2) return {signal:"SELL",conf:0.8};

    return {signal:"NEUTRAL",conf:0.5};
  }
}

const brain = new V10Brain();

// =============================
// 📥 ENGINE
// =============================

function onTick(price){

  const sym = "R_100";

  if(!state[sym]){
    state[sym] = {ticks:[]};
  }

  const s = state[sym];

  s.ticks.push(price);
  if(s.ticks.length > 200) s.ticks.shift();

  if(s.ticks.length < 30) return;

  if(!guard.allow()) return;

  // FEATURES
  const f = {
    ema20: EMA(s.ticks.slice(-20),20),
    ema50: EMA(s.ticks.slice(-50),50),
    momentum: price - s.ticks[s.ticks.length-5],
    ...SR(s.ticks)
  };

  const d = brain.decide(f);

  document.getElementById("signal").innerText =
    "SIGNAL: " + d.signal;

  log("price=" + price + " | signal=" + d.signal);

  if(d.signal !== "NEUTRAL"){
    log("🚀 EXEC " + d.signal);
  }
}

// =============================
// 🧪 FAKE DATA FEED
// =============================

setInterval(()=>{
  const price = 100 + Math.random()*0.5;
  onTick(price);
}, 800);

</script>

</body>
</html>
