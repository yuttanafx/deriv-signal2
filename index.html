<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V11 AI Multi-Symbol Dashboard</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.symbol{
  font-size:14px;
  opacity:0.7;
}

.signal{
  font-size:26px;
  font-weight:bold;
  margin:10px 0;
}

.call{color:#22c55e;}
.put{color:#ef4444;}
.neutral{color:#fbbf24;}

.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🚀 V11 AI MULTI-SYMBOL DASHBOARD</div>

<div class="grid" id="grid"></div>

<script>

// =====================
// SYMBOLS (8 ตัว)
// =====================

const symbols = [
  "R_10","R_25","R_50","R_75",
  "R_100","R_150","R_200","R_300"
];

// =====================
// STATE
// =====================

let state = {};

function randPrice(){
  return 100 + Math.random()*0.5;
}

// =====================
// SIMPLE AI (CLEAN SIGNAL ONLY)
// =====================

function decide(price, prev){

  const diff = price - prev;

  if(diff > 0.02) return "CALL";
  if(diff < -0.02) return "PUT";
  return "NEUTRAL";
}

// =====================
// UI RENDER
// =====================

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    if(!state[sym]){
      state[sym] = {
        price: randPrice(),
        prev: randPrice(),
        signal: "NEUTRAL"
      };
    }

    const s = state[sym];

    s.prev = s.price;
    s.price = randPrice();
    s.signal = decide(s.price, s.prev);

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card">
        <div class="symbol">${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
        <div class="small">PRICE: ${s.price.toFixed(3)}</div>
      </div>
    `;
  });
}

// =====================
// LOOP
// =====================

setInterval(render, 800);

</script>

</body>
</html>
