<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V10 AI Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  margin: 0;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.gray { color: #9ca3af; }

#log {
  height: 250px;
  overflow: auto;
  background: #0f172a;
  padding: 10px;
  margin-top: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>🚀 V10 AI Trading Dashboard</h2>

<div class="grid">

  <div class="card">
    <div>PRICE</div>
    <div id="price" class="big">-</div>
  </div>

  <div class="card">
    <div>SIGNAL</div>
    <div id="signal" class="big gray">WAIT</div>
  </div>

  <div class="card">
    <div>FILTER</div>
    <div id="filter" class="big gray">NORMAL</div>
  </div>

</div>

<div class="grid" style="margin-top:10px;">

  <div class="card">
    <div>SUPPORT</div>
    <div id="support">-</div>
  </div>

  <div class="card">
    <div>RESISTANCE</div>
    <div id="resistance">-</div>
  </div>

  <div class="card">
    <div>CONFIDENCE</div>
    <div id="conf">-</div>
  </div>

</div>

<h3>📊 LOG</h3>
<div id="log"></div>

<script>

// =====================
// STATE
// =====================

let state = {};

// =====================
// LOG
// =====================

function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

// =====================
// TOOLS
// =====================

function EMA(arr){
  let ema = arr[0];
  const k = 0.1;
  for(let i=1;i<arr.length;i++){
    ema = arr[i]*k + ema*(1-k);
  }
  return ema;
}

function SR(t){
  return {
    support: Math.min(...t.slice(-20)),
    resistance: Math.max(...t.slice(-20))
  };
}

// =====================
// ENGINE
// =====================

function onTick(price){

  const sym = "R_100";

  if(!state[sym]) state[sym] = {ticks:[]};

  const s = state[sym];
  s.ticks.push(price);
  if(s.ticks.length > 200) s.ticks.shift();

  if(s.ticks.length < 20) return;

  const sr = SR(s.ticks);

  const ema = EMA(s.ticks.slice(-20));

  const momentum = price - s.ticks[s.ticks.length-5];

  // FILTER
  let filter = "NORMAL";
  const range = sr.resistance - sr.support;

  if(range < 0.005) filter = "TIGHT";
  if(range > 0.02) filter = "NOISE";

  // SIGNAL
  let signal = "NEUTRAL";
  let conf = 0.5;

  if(filter !== "NOISE"){

    if(price > sr.resistance && momentum > 0){
      signal = "BUY";
      conf = 0.8;
    }

    if(price < sr.support && momentum < 0){
      signal = "SELL";
      conf = 0.8;
    }
  }

  // =====================
  // UI UPDATE
  // =====================

  document.getElementById("price").innerText = price.toFixed(5);

  document.getElementById("signal").innerText = signal;

  document.getElementById("support").innerText = sr.support.toFixed(5);
  document.getElementById("resistance").innerText = sr.resistance.toFixed(5);

  document.getElementById("conf").innerText = conf;

  document.getElementById("filter").innerText = filter;

  // COLORS
  document.getElementById("signal").className =
    "big " + (signal==="BUY"?"green":signal==="SELL"?"red":"gray");

  log(`price=${price} | signal=${signal} | filter=${filter}`);

}

// =====================
// FAKE DATA
// =====================

setInterval(()=>{
  const price = 100 + Math.random()*0.5;
  onTick(price);
}, 800);

</script>

</body>
</html>
