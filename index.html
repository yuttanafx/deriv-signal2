<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V18 STABLE TRADING SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.signal{
  font-size:18px;
  font-weight:bold;
}

.call{color:#22c55e}
.put{color:#ef4444}
.neutral{color:#fbbf24}

/* MAIN */
.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:10px;
}

/* CHART */
.chart{
  height:520px;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
}

/* PANEL */
.panel{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">
  <div>🚀 V18 STABLE SYSTEM</div>
  <div id="activeSym">EURUSD</div>
</div>

<div class="grid" id="grid"></div>

<div class="main">

  <!-- CHART -->
  <div class="chart" id="chartBox"></div>

  <!-- SIDE -->
  <div>
    <div class="panel">
      🧠 SIGNAL<br>
      <div id="liveSignal">WAIT</div>
    </div>

    <div class="panel">
      📊 STATUS<br>
      STABLE ENGINE ACTIVE
    </div>
  </div>

</div>

<script>

// =========================
// SYMBOLS (REAL TRADE STYLE)
// =========================

const symbols = [
"EURUSD","GBPUSD","USDJPY","AUDUSD",
"USDCAD","BTCUSD","ETHUSD","XAUUSD"
];

// =========================
// STATE (NO RESET)
// =========================

let state = {};
let currentSymbol = "EURUSD";

// =========================
// CHART CONTROL (FIXED)
// =========================

function loadChart(symbol){

  currentSymbol = symbol;
  document.getElementById("activeSym").innerText = symbol;

  const box = document.getElementById("chartBox");

  // ❗ CLEAN OLD CHART ONLY
  box.innerHTML = "";

  const iframe = document.createElement("iframe");

  iframe.src =
    "https://www.tradingview.com/widgetembed/?" +
    "symbol=" + encodeURIComponent(symbol) +
    "&interval=1&theme=dark";

  iframe.width = "100%";
  iframe.height = "520";
  iframe.style.border = "0";

  box.appendChild(iframe);
}

// =========================
// ENGINE (DATA ONLY)
// =========================

function tick(symbol){

  if(!state[symbol]){
    state[symbol] = {
      price:100+Math.random(),
      prev:100+Math.random(),
      signal:"NEUTRAL",
      score:0
    };
  }

  const s = state[symbol];

  s.prev = s.price;
  s.price = 100 + Math.random()*0.5;

  const diff = s.price - s.prev;

  let score = 0;
  let signal = "NEUTRAL";

  if(diff > 0.02) score += 2;
  if(diff < -0.02) score -= 2;

  if(score >= 2) signal = "CALL";
  if(score <= -2) signal = "PUT";

  s.score = score;
  s.signal = signal;

  return s;
}

// =========================
// RENDER UI ONLY (NO CHART TOUCH)
// =========================

function renderUI(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  symbols.forEach(sym=>{

    const s = tick(sym);

    let cls = "neutral";
    if(s.signal==="CALL") cls="call";
    if(s.signal==="PUT") cls="put";

    grid.innerHTML += `
      <div class="card" onclick="loadChart('${sym}')">
        <div>${sym}</div>
        <div class="signal ${cls}">${s.signal}</div>
        <div style="font-size:12px;opacity:0.7">
          SCORE: ${s.score}
        </div>
      </div>
    `;
  });

  document.getElementById("liveSignal").innerText =
    state[currentSymbol]?.signal || "WAIT";
}

// =========================
// SAFE LOOP (NO DOM CONFLICT)
// =========================

function loop(){

  renderUI(); // UI only

  // auto update chart ONLY if first load
  if(!window.chartLoaded){
    loadChart(currentSymbol);
    window.chartLoaded = true;
  }
}

// =========================
// START
// =========================

setInterval(loop, 1200);

</script>

</body>
</html>
